<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salaries</title>
    <!-- Favicon: Blue Baht Sign -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%232563eb'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' fill='white' font-family='sans-serif' font-weight='900' font-size='20'%3E฿%3C/text%3E%3C/svg%3E">
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- ES Module Shims for Import Map support in older browsers -->
    <script async src="https://ga.jspm.io/npm:es-module-shims@1.7.0/dist/es-module-shims.js"></script>

    <!-- Synchronize React versions using an Import Map -->
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom": "https://esm.sh/react-dom@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.284.0?external=react"
      }
    }
    </script>

    <!-- Babel for JSX processing -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
      table { border-collapse: collapse; width: 100%; }
      input[type=number]::-webkit-inner-spin-button, 
      input[type=number]::-webkit-outer-spin-button { 
        -webkit-appearance: none; 
        margin: 0; 
      }
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo, useRef, Fragment } from 'react';
        import ReactDOM from 'react-dom/client';
        import { 
          Users, DollarSign, FileUp, Plus, Search, Trash2, Edit2, CheckCircle2, 
          XCircle, History, Calendar, ArrowRightLeft, AlertCircle, Check, 
          ArrowUpDown, BarChart3, TrendingUp, ChevronDown, ChevronUp, Settings, 
          Scale, AlertTriangle, Eye, EyeOff, Database, Info, Filter, Users2, Layers
        } from 'lucide-react';

        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { 
          getFirestore, collection, doc, onSnapshot, updateDoc, deleteDoc, 
          writeBatch, addDoc, setDoc 
        } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';
        import { 
          getAuth, signInAnonymously, onAuthStateChanged 
        } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';

        // --- Configuration ---
        const firebaseConfig = {
          apiKey: "AIzaSyAy5dE4_Dwu8zD-DYxJ24PHqmwUyTQSkB0",
          authDomain: "wetsalaries.firebaseapp.com",
          projectId: "wetsalaries",
          storageBucket: "wetsalaries.firebasestorage.app",
          messagingSenderId: "36556559550",
          appId: "1:36556559550:web:452bdc0692c1d85499baef"
        };

        const appId = 'wetsalaries-app';
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- Global Constants ---
        const COLOR_OPTIONS = [
          { name: 'RED', hex: '#ef4444' }, { name: 'LIGHT RED', hex: '#ff6666' },
          { name: 'ORANGE', hex: '#f97316' }, { name: 'LIGHT ORANGE', hex: '#fdba74' },
          { name: 'YELLOW', hex: '#ffee00' }, { name: 'LIGHT YELLOW', hex: '#ffff99' },
          { name: 'GREEN', hex: '#22c55e' }, { name: 'NEON GREEN', hex: '#00ff99' },
          { name: 'LIGHT GREEN', hex: '#86efac' }, { name: 'DARK TEAL', hex: '#003366' },
          { name: 'BLUE', hex: '#3b82f6' }, { name: 'NEON TEAL', hex: '#00ffff' },
          { name: 'LIGHT BLUE', hex: '#99ccff' }, { name: 'PURPLE', hex: '#a855f7' },
          { name: 'LIGHT PURPLE', hex: '#cc99ff' }, { name: 'NEON PINK', hex: '#ff0099' },
          { name: 'PINK', hex: '#ff99cc' }, { name: 'LIGHT PINK', hex: '#ffcccc' },
          { name: 'BROWN', hex: '#78350f' }, { name: 'LIGHT BROWN/TAN', hex: '#cc9966' },
          { name: 'BLACK', hex: '#000000' }, { name: 'GREY', hex: '#64748b' }
        ];

        const TYPES = ['Salary', 'Advance', 'Repayment'];
        const DEFAULT_DEPT_CONFIGS = [
          { name: 'Management', color: '#3b82f6' },
          { name: 'Bar', color: '#ffee00' },
          { name: 'Housekeeping', color: '#ff99cc' },
          { name: 'Maintenance', color: '#22c55e' },
          { name: 'Other', color: '#64748b' }
        ];

        const MANAGEMENT_ORDER = ['Mint', 'Fah', 'Sao', 'Loren', 'Mike'];
        const MONTHS = ["01-Jan", "02-Feb", "03-Mar", "04-Apr", "05-May", "06-Jun", "07-Jul", "08-Aug", "09-Sep", "10-Oct", "11-Nov", "12-Dec"];

        // --- Helpers ---
        const getHexColor = (input) => {
          if (!input) return '#64748b';
          if (input.startsWith('#')) return input;
          const match = COLOR_OPTIONS.find(o => o.name.toLowerCase() === input.toLowerCase());
          return match ? match.hex : '#64748b';
        };

        const getDeptRowColor = (deptName, configs) => {
          const hex = getHexColor(configs?.find(c => c.name === deptName)?.color);
          const r = parseInt(hex.slice(1, 3), 16);
          const g = parseInt(hex.slice(3, 5), 16);
          const b = parseInt(hex.slice(5, 7), 16);
          return `rgba(${r}, ${g}, ${b}, 0.15)`;
        };

        const getDeptSolidWash = (deptName, configs) => {
          const hex = getHexColor(configs?.find(c => c.name === deptName)?.color);
          const r = Math.round(parseInt(hex.slice(1, 3), 16) * 0.15 + 255 * 0.85);
          const g = Math.round(parseInt(hex.slice(3, 5), 16) * 0.15 + 255 * 0.85);
          const b = Math.round(parseInt(hex.slice(5, 7), 16) * 0.15 + 255 * 0.85);
          return `rgb(${r}, ${g}, ${b})`;
        };

        const getDeptDotColor = (deptName, configs) => getHexColor(configs?.find(c => c.name === deptName)?.color);

        const getSortScore = (member, deptNames) => {
          if (!member) return 99999999;
          const statusWeight = member.status === 'inactive' ? 10000000 : 0;
          const deptIdx = deptNames.indexOf(member.department);
          let nameIdx = 999;
          if (member.department === 'Management') {
            const foundIdx = MANAGEMENT_ORDER.indexOf((member.name || "").trim());
            nameIdx = foundIdx === -1 ? 900 : foundIdx;
          } else {
            nameIdx = (member.name || "").trim().toLowerCase().charCodeAt(0) || 999;
          }
          return statusWeight + (deptIdx * 1000) + nameIdx;
        };

        const formatDisplayDate = (iso) => {
          if (!iso) return '-';
          const d = new Date(iso);
          const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
          return `${d.getFullYear()}-${monthNames[d.getMonth()]}-${d.getDate().toString().padStart(2, '0')}`;
        };

        const isSameMonth = (dbMonth, targetMonth) => {
          if (!dbMonth || !targetMonth) return false;
          const cleanDb = String(dbMonth).toLowerCase();
          const cleanTarget = String(targetMonth).toLowerCase();
          return cleanDb === cleanTarget || cleanDb.includes(cleanTarget) || cleanTarget.includes(cleanDb);
        };

        // --- Main Components ---

        function App() {
          const [user, setUser] = useState(null);
          const [activeTab, setActiveTab] = useState('summary');
          const [salaries, setSalaries] = useState([]);
          const [staff, setStaff] = useState([]);
          const [deptConfigs, setDeptConfigs] = useState(DEFAULT_DEPT_CONFIGS);
          const [loading, setLoading] = useState(true);
          const [showInactive, setShowInactive] = useState(true);
          const [collapseExStaff, setCollapseExStaff] = useState(false);
          const [groupHistoryByBatch, setGroupHistoryByBatch] = useState(true);
          
          const [confirmModal, setConfirmModal] = useState({ open: false, title: '', message: '', onConfirm: null });
          const [logFilter, setLogFilter] = useState("All");
          const [logPeriodFilter, setLogPeriodFilter] = useState("All");
          const [logSort, setLogSort] = useState({ key: 'timestamp', dir: 'desc' });
          const [deptFilter, setDeptFilter] = useState("All");
          const [selectedCalendarYear, setSelectedCalendarYear] = useState(new Date().getFullYear());
          const [debtFilter, setDebtFilter] = useState("All");
          const [debtSort, setDebtSort] = useState({ key: 'balance', dir: 'desc' });

          const [isBulkModalOpen, setIsBulkModalOpen] = useState(false);
          const [isEditModalOpen, setIsEditModalOpen] = useState(false);
          const [isDeptModalOpen, setIsDeptModalOpen] = useState(false);
          const [editItem, setEditItem] = useState(null);

          const deptNames = useMemo(() => deptConfigs.map(c => c.name), [deptConfigs]);

          useEffect(() => {
            const initAuth = async () => {
                try { await signInAnonymously(auth); } catch (err) { console.error("Auth Failed", err); }
            };
            initAuth();
            const unsubscribe = onAuthStateChanged(auth, setUser);
            return () => unsubscribe();
          }, []);

          useEffect(() => {
            if (!user) return;
            const unsubStaff = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'staff'), (snap) => {
              setStaff(snap.docs.map(d => ({ id: d.id, ...d.data() })));
              setLoading(false);
            });
            const unsubSal = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'salaries'), (snap) => {
              setSalaries(snap.docs.map(d => ({ id: d.id, ...d.data() })));
            });
            const unsubDepts = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'config'), (snap) => {
              if (snap.exists() && snap.data().depts) setDeptConfigs(snap.data().depts);
            });
            return () => { unsubStaff(); unsubSal(); unsubDepts(); };
          }, [user]);

          const years = useMemo(() => {
            const uniqueYears = [...new Set(salaries.map(s => Number(s.year)))].sort((a,b) => b-a);
            const currentYear = new Date().getFullYear();
            if (!uniqueYears.includes(currentYear)) uniqueYears.push(currentYear);
            return uniqueYears.sort((a,b) => b-a);
          }, [salaries]);

          const staffMap = useMemo(() => Object.fromEntries(staff.map(s => [(s.name || "").trim(), s])), [staff]);
          const sortedStaff = useMemo(() => [...staff].sort((a, b) => getSortScore(a, deptNames) - getSortScore(b, deptNames)), [staff, deptNames]);

          const ledgerData = useMemo(() => {
            const currentYear = Number(selectedCalendarYear);
            return sortedStaff
              .filter(s => (deptFilter === 'All' || s.department === deptFilter))
              .map(member => {
                const memberName = (member.name || "").trim().toLowerCase();
                const memberSalaries = salaries.filter(s => (s.staffName || "").trim().toLowerCase() === memberName);
                const payoutRow = { ...member, type: 'payout', monthlyActivity: {} };
                const loanRow = { ...member, type: 'loan', monthlyActivity: {} };
                const previousBalance = memberSalaries
                    .filter(s => Number(s.year) < currentYear)
                    .reduce((sum, r) => {
                        const t = String(r.type).toLowerCase();
                        if (t === 'advance') return sum + Number(r.amount);
                        if (t === 'repayment') return sum - Number(r.amount);
                        return sum;
                    }, 0);
                loanRow.balanceForward = previousBalance;
                MONTHS.forEach(m => {
                  const monthRecords = memberSalaries.filter(s => isSameMonth(s.month, m) && Number(s.year) === currentYear);
                  const pAmt = monthRecords.filter(r => ['salary', 'advance'].includes(String(r.type).toLowerCase())).reduce((a, c) => a + Number(c.amount), 0);
                  const lAmt = monthRecords.reduce((a, c) => {
                    const t = String(c.type).toLowerCase();
                    if (t === 'advance') return a + Number(c.amount);
                    if (t === 'repayment') return a - Number(c.amount);
                    return a;
                  }, 0);
                  payoutRow[m] = pAmt; loanRow[m] = lAmt;
                  payoutRow.monthlyActivity[m] = pAmt !== 0;
                  loanRow.monthlyActivity[m] = monthRecords.some(r => ['advance', 'repayment'].includes(String(r.type).toLowerCase()));
                });
                payoutRow.rowTotal = MONTHS.reduce((s, m) => s + (payoutRow[m] || 0), 0);
                loanRow.rowTotal = previousBalance + MONTHS.reduce((s, m) => s + (loanRow[m] || 0), 0);
                const hasYearActivity = memberSalaries.some(s => Number(s.year) === currentYear);
                loanRow.hasLoanActivity = loanRow.balanceForward !== 0 || loanRow.rowTotal !== 0 || MONTHS.some(m => loanRow[m] !== 0);
                return { payoutRow, loanRow, hasYearActivity };
              }).filter(row => row.hasYearActivity || row.loanRow.hasLoanActivity || row.payoutRow.status === 'active');
          }, [salaries, sortedStaff, selectedCalendarYear, deptFilter]);

          const teamTotals = useMemo(() => {
            const totals = { payout: { rowTotal: 0 }, loan: { rowTotal: 0, balanceForward: 0 } };
            ledgerData.forEach(p => {
              totals.loan.balanceForward += (p.loanRow.balanceForward || 0);
              MONTHS.forEach(m => {
                totals.payout[m] = (totals.payout[m] || 0) + (p.payoutRow[m] || 0);
                totals.loan[m] = (totals.loan[m] || 0) + (p.loanRow[m] || 0);
              });
              totals.payout.rowTotal += p.payoutRow.rowTotal;
              totals.loan.rowTotal += p.loanRow.rowTotal;
            });
            return totals;
          }, [ledgerData]);

          const filteredLog = useMemo(() => {
            let result = salaries.map(s => ({
                ...s,
                period: `${s.year}-${String(s.month).split('-')[1]}`
            }));
            if (logFilter !== "All") {
              if (logFilter.startsWith("DEPT:")) {
                const dName = logFilter.replace("DEPT:", "");
                result = result.filter(s => staffMap[(s.staffName || "").trim()]?.department === dName);
              } else if (logFilter.startsWith("STAFF:")) {
                const sName = logFilter.replace("STAFF:", "");
                result = result.filter(s => (s.staffName || "").trim().toLowerCase() === sName.toLowerCase());
              }
            }
            if (logPeriodFilter !== "All") result = result.filter(s => s.period === logPeriodFilter);
            
            result.sort((a, b) => {
              if (groupHistoryByBatch && (a.batchId || 'z') !== (b.batchId || 'z')) {
                return (b.timestamp || "").localeCompare(a.timestamp || "");
              }
              let valA = a[logSort.key];
              let valB = b[logSort.key];
              if (logSort.key === 'amount') { valA = Number(valA); valB = Number(valB); }
              if (logSort.key === 'staffName') {
                  const memberA = staffMap[(a.staffName || "").trim()];
                  const memberB = staffMap[(b.staffName || "").trim()];
                  valA = getSortScore(memberA, deptNames);
                  valB = getSortScore(memberB, deptNames);
              }
              if (valA < valB) return logSort.dir === 'asc' ? -1 : 1;
              if (valA > valB) return logSort.dir === 'asc' ? 1 : -1;
              return 0;
            });
            return result;
          }, [salaries, logFilter, logPeriodFilter, logSort, staffMap, deptNames, groupHistoryByBatch]);

          if (loading) return <div className="h-screen flex items-center justify-center font-black text-slate-400">Loading Database...</div>;

          return (
            <div className="flex flex-col h-screen bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 overflow-hidden text-[13px] font-sans">
              <header className="bg-white dark:bg-slate-900 border-b-2 border-slate-300 px-3 py-1 flex items-center justify-between shrink-0 shadow-sm z-50">
                <div className="flex items-center gap-2">
                  <div className="bg-blue-600 px-1.5 rounded text-white font-black text-xs">฿</div>
                  <span className="font-black tracking-tighter text-sm uppercase dark:text-white">Salaries</span>
                </div>
                <div className="flex gap-1.5">
                  <Button size="sm" onClick={() => setIsBulkModalOpen(true)}><Plus size={12}/> Add Salary</Button>
                </div>
              </header>

              <nav className="flex bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 shrink-0 shadow-sm z-40 overflow-x-auto">
                <Tab active={activeTab === 'summary'} onClick={() => setActiveTab('summary')} icon={<Calendar size={14}/>} label="Calendar" />
                <Tab active={activeTab === 'history'} onClick={() => setActiveTab('history')} icon={<History size={14}/>} label="Log" />
                <Tab active={activeTab === 'debt'} onClick={() => setActiveTab('debt')} icon={<Scale size={14}/>} label="Debt Center" />
                <Tab active={activeTab === 'reports'} onClick={() => setActiveTab('reports')} icon={<BarChart3 size={14}/>} label="Reports" />
                <Tab active={activeTab === 'staff'} onClick={() => setActiveTab('staff')} icon={<Users size={14}/>} label="Staff" />
              </nav>

              <main className="flex-1 overflow-hidden relative">
                {activeTab === 'summary' && (
                  <div className="h-full flex flex-col p-1.5 space-y-2 overflow-y-auto">
                    <div className="sticky top-0 z-40 bg-slate-50 dark:bg-slate-950 pb-1 flex items-center justify-between gap-2 shrink-0 border-b border-slate-200 dark:border-slate-800">
                      <div className="flex gap-1 overflow-x-auto">
                        {['All', ...deptNames].map(d => (
                          <button key={String(d)} onClick={() => setDeptFilter(String(d))} className={`px-2 py-0.5 rounded text-[8px] font-black uppercase transition-all whitespace-nowrap ${deptFilter === String(d) ? 'bg-blue-600 text-white shadow-md' : 'bg-white dark:bg-slate-800 text-slate-500 border border-slate-300 dark:border-slate-700'}`}>{String(d)}</button>
                        ))}
                      </div>
                      <div className="flex items-center gap-2">
                        <button onClick={() => setCollapseExStaff(!collapseExStaff)} className={`flex items-center gap-1 px-2 py-0.5 rounded text-[10px] font-black uppercase border transition-all ${collapseExStaff ? 'bg-blue-600 border-blue-700 text-white shadow-sm' : 'bg-white dark:bg-slate-800 border-slate-300 dark:border-slate-700 text-slate-500'}`}><Users2 size={12}/><span>Ex-Staff</span></button>
                        <select value={selectedCalendarYear} onChange={e => setSelectedCalendarYear(parseInt(e.target.value))} className="bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-700 px-1.5 py-0.5 rounded font-bold text-[10px] outline-none text-slate-900 dark:text-white">{years.map(y => <option key={y} value={y}>{y}</option>)}</select>
                      </div>
                    </div>
                    <div className="space-y-0.5">
                      <h3 className="text-[9px] font-black uppercase text-slate-400 pl-1 tracking-widest">Net Payouts</h3>
                      <CalendarTable data={ledgerData.map(p => p.payoutRow)} totals={teamTotals.payout} deptConfigs={deptConfigs} collapseExStaff={collapseExStaff} />
                    </div>
                    <div className="h-4"></div>
                    <div className="space-y-0.5 pb-10">
                      <h3 className="text-[9px] font-black uppercase text-slate-400 pl-1 tracking-widest">Loan Ledger</h3>
                      <CalendarTable data={ledgerData.map(p => p.loanRow).filter(r => r.hasLoanActivity)} totals={teamTotals.loan} isLoanTable deptConfigs={deptConfigs} collapseExStaff={collapseExStaff} />
                    </div>
                  </div>
                )}

                {activeTab === 'history' && (
                  <HistoryView filteredLog={filteredLog} staffMap={staffMap} deptConfigs={deptConfigs} logSort={logSort} setLogSort={setLogSort} setEditItem={setEditItem} setIsEditModalOpen={setIsEditModalOpen} logFilter={logFilter} setLogFilter={setLogFilter} sortedStaff={sortedStaff} deptNames={deptNames} salaries={salaries} logPeriodFilter={logPeriodFilter} setLogPeriodFilter={setLogPeriodFilter} groupHistoryByBatch={groupHistoryByBatch} setGroupHistoryByBatch={setGroupHistoryByBatch} />
                )}
                
                {activeTab === 'debt' && (
                  <div className="h-full flex flex-col p-1.5 space-y-2 text-slate-900">
                    <div className="sticky top-0 z-40 bg-slate-50 dark:bg-slate-950 pb-1 border-b dark:border-slate-800">
                       <h4 className="text-[10px] font-black uppercase text-slate-400 flex items-center gap-1 ml-1 tracking-tight"><Scale size={12}/> Lifetime Balance Dashboard</h4>
                       <div className="grid grid-cols-2 gap-2">
                          <FilterDropdown label="Filter Staff:" value={debtFilter} onChange={setDebtFilter} staff={sortedStaff} deptNames={deptNames} />
                          <div className="flex flex-col gap-0.5">
                            <label className="text-[8px] font-black uppercase text-slate-500 tracking-tighter uppercase">Order By:</label>
                            <select value={debtSort.key} onChange={e => setDebtSort({ ...debtSort, key: e.target.value })} className="w-full px-1.5 py-1 bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-700 rounded font-black text-xs outline-none text-slate-900 dark:text-white">
                               <option value="balance">Owed (Highest First)</option>
                               <option value="name">Name (Active First)</option>
                               <option value="advances">Total Advanced</option>
                            </select>
                          </div>
                       </div>
                    </div>
                    <div className="flex-1 overflow-auto bg-white dark:bg-slate-900 rounded border-2 border-slate-400 dark:border-slate-700 shadow-sm">
                       <DebtLedger salaries={salaries} staff={sortedStaff} filter={debtFilter} sort={debtSort} deptConfigs={deptConfigs} deptNames={deptNames} />
                    </div>
                  </div>
                )}

                {activeTab === 'reports' && <ReportsView salaries={salaries} staff={sortedStaff} staffMap={staffMap} selectedYear={selectedCalendarYear} setSelectedYear={setSelectedCalendarYear} years={years} deptConfigs={deptConfigs} />}
                
                {activeTab === 'staff' && (
                  <div className="h-full flex flex-col p-1.5 space-y-1 text-slate-900">
                    <div className="flex gap-1.5 items-center justify-between sticky top-0 z-40 bg-slate-50 dark:bg-slate-950 pb-1 border-b dark:border-slate-800">
                       <button onClick={() => setShowInactive(!showInactive)} className={`px-3 py-1 rounded-full border-2 border-slate-300 dark:border-slate-700 text-[10px] font-black uppercase flex items-center gap-1.5 transition-all ${showInactive ? 'bg-blue-600 text-white border-blue-700' : 'bg-white dark:bg-slate-800 text-slate-500'}`}>{showInactive ? <EyeOff size={12}/> : <Eye size={12}/>}{showInactive ? "Inactive Visible" : "Show Inactive"}</button>
                       <div className="flex gap-1">
                         <Button variant="outline" size="sm" onClick={() => setIsDeptModalOpen(true)}><Settings size={12}/> Depts</Button>
                         <Button size="sm" onClick={async () => { await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'staff'), { name: 'New Entry', department: 'Other', status: 'active', baseSalary: 0 }); }}><Plus size={12}/> Add Staff</Button>
                       </div>
                    </div>
                    <div className="flex-1 overflow-auto bg-white dark:bg-slate-900 rounded border-2 border-slate-400 dark:border-slate-700">
                      <table className="w-full text-left border-collapse">
                        <thead className="sticky top-0 z-10 text-[10px] uppercase font-black text-slate-600 dark:text-slate-300">
                          <tr><th className="px-2 py-1.5 uppercase bg-[#e8eaed] dark:bg-slate-800">Name</th><th className="px-2 py-1.5 uppercase bg-[#e8eaed] dark:bg-slate-800">Dept</th><th className="px-2 py-1.5 text-right uppercase bg-[#e8eaed] dark:bg-slate-800">Base ฿</th><th className="px-2 py-1.5 text-center uppercase bg-[#e8eaed] dark:bg-slate-800">Act</th><th className="px-2 py-1.5 bg-[#e8eaed] dark:bg-slate-800"></th></tr>
                        </thead>
                        <tbody className="divide-y divide-slate-100 dark:divide-slate-800">
                          {sortedStaff.map(member => {
                            if (!showInactive && member.status === 'inactive') return null;
                            const rowBg = getDeptRowColor(member.department, deptConfigs);
                            return (
                              <tr key={member.id} className={`leading-none ${member.status==='inactive'?'italic text-slate-400':''}`}>
                                <td className="px-2 py-0.5" style={{ backgroundColor: rowBg }}>
                                  <div className="flex items-center gap-2">
                                     <div className="w-1.5 h-1.5 rounded-full shrink-0 border border-white/50 shadow-sm" style={{ backgroundColor: getDeptDotColor(member.department, deptConfigs) }}></div>
                                     <input className="bg-transparent font-black w-full outline-none p-0.5 rounded text-[16px]" defaultValue={member.name} onBlur={(e) => updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'staff', member.id), { name: e.target.value })} />
                                  </div>
                                </td>
                                <td className="px-2 py-0.5" style={{ backgroundColor: rowBg }}>
                                  <select className="bg-transparent font-bold outline-none cursor-pointer w-full text-[13px]" value={member.department} onChange={(e) => updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'staff', member.id), { department: e.target.value })}>
                                    {deptNames.map(d => <option key={String(d)} value={String(d)}>{String(d)}</option>)}
                                  </select>
                                </td>
                                <td className="px-2 py-0.5 text-right" style={{ backgroundColor: rowBg }}><input type="number" className="bg-transparent text-right font-black outline-none w-full max-w-[100px] p-0.5 rounded text-[16px]" defaultValue={member.baseSalary || 0} onBlur={(e) => updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'staff', member.id), { baseSalary: parseFloat(e.target.value) || 0 })} /></td>
                                <td className="px-2 py-0.5 text-center" style={{ backgroundColor: rowBg }}><button onClick={() => updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'staff', member.id), { status: member.status==='active'?'inactive':'active' })} className={`p-1 rounded-full ${member.status==='active'?'text-blue-600':'text-slate-300'}`}>{member.status==='active'?<CheckCircle2 size={20}/>:<XCircle size={20}/>}</button></td>
                                <td className="px-2 py-0.5 text-right" style={{ backgroundColor: rowBg }}><button onClick={() => { if (salaries.some(s => (s.staffName || "").trim().toLowerCase() === (member.name || "").trim().toLowerCase())) { setConfirmModal({ open: true, title: 'Delete Blocked', message: `${member.name} has existing logs. Please mark them as 'Inactive' instead.`, onConfirm: null }); } else { setConfirmModal({ open: true, title: 'Confirm Delete', message: `Delete ${member.name}?`, onConfirm: async () => { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'staff', member.id)); setConfirmModal(prev => ({...prev, open: false})); } }); } }} className="text-slate-400 hover:text-red-500 p-1"><Trash2 size={16}/></button></td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                  </div>
                )}
              </main>

              {confirmModal.open && (
                <div className="fixed inset-0 z-[300] flex items-center justify-center p-4 bg-slate-950/80">
                    <div className="bg-white dark:bg-slate-900 max-sm w-full rounded-xl border-2 border-slate-400 dark:border-slate-700 shadow-2xl p-6 space-y-4 text-slate-900 dark:text-slate-100">
                       <div className="flex items-center gap-3 text-red-600"><AlertTriangle size={32} /><h3 className="font-black uppercase tracking-tight text-xl">{confirmModal.title}</h3></div>
                       <p className="font-bold text-slate-600 dark:text-slate-400 leading-relaxed text-sm">{confirmModal.message}</p>
                       <div className="flex justify-end gap-3 pt-2">
                          <Button variant="outline" onClick={() => setConfirmModal({ ...confirmModal, open: false })}>Cancel</Button>
                          {confirmModal.onConfirm && (<Button onClick={confirmModal.onConfirm} className="bg-red-600 hover:bg-red-700 text-white">Continue</Button>)}
                       </div>
                    </div>
                </div>
              )}

              {isDeptModalOpen && <DeptManagerModal configs={deptConfigs} onClose={() => setIsDeptModalOpen(false)} onSave={async (updated) => { await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'config'), { depts: updated }); }} />}

              {isBulkModalOpen && (
                <BulkPaymentModal 
                  staff={sortedStaff.filter(s => s.status==='active')} 
                  deptConfigs={deptConfigs} 
                  salaries={salaries}
                  onClose={() => setIsBulkModalOpen(false)} 
                  onSave={async (rows, yr, mo, dt, total) => {
                    const batch = writeBatch(db);
                    const bId = crypto.randomUUID();
                    rows.forEach(r => {
                      if (!r.included) return;
                      const base = { staffName: r.name, year: yr, month: mo, timestamp: dt ? new Date(dt).toISOString() : new Date().toISOString(), notes: r.notes, batchId: bId, batchTotal: total };
                      if (r.salary > 0) batch.set(doc(collection(db, 'artifacts', appId, 'public', 'data', 'salaries')), { ...base, amount: r.salary, type: 'Salary' });
                      if (r.advance > 0) batch.set(doc(collection(db, 'artifacts', appId, 'public', 'data', 'salaries')), { ...base, amount: r.advance, type: 'Advance' });
                      if (r.repayment > 0) batch.set(doc(collection(db, 'artifacts', appId, 'public', 'data', 'salaries')), { ...base, amount: r.repayment, type: 'Repayment' });
                    });
                    await batch.commit();
                    setIsBulkModalOpen(false);
                  }}
                />
              )}
              
              {isEditModalOpen && editItem && (
                <Modal title="Edit Record" onClose={() => setIsEditModalOpen(false)}>
                  <form onSubmit={async (e) => { e.preventDefault(); const fd = new FormData(e.target); await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'salaries', editItem.id), { amount: parseFloat(fd.get('amount')), type: fd.get('type'), year: parseInt(fd.get('year')), month: fd.get('month'), notes: fd.get('notes'), timestamp: new Date(fd.get('timestamp')).toISOString() }); setIsEditModalOpen(false); }} className="space-y-4 text-slate-900 dark:text-slate-100">
                    <div className="text-[11px] font-black uppercase text-blue-600 border-b pb-2">Record: {String(editItem.staffName)}</div>
                    <div className="flex flex-col gap-0.5"><label className="text-[9px] font-black uppercase text-slate-500">Manual Date</label><input name="timestamp" type="date" className="px-2 py-1 border-2 border-slate-300 dark:border-slate-700 rounded bg-white dark:bg-slate-800 text-slate-900 dark:text-white font-bold" defaultValue={new Date(editItem.timestamp || Date.now()).toISOString().split('T')[0]} /></div>
                    <div className="flex flex-col gap-0.5"><label className="text-[9px] font-black uppercase text-slate-500">Amount (฿)</label><input name="amount" type="number" className="px-2 py-1 border-2 border-slate-300 dark:border-slate-700 rounded bg-white dark:bg-slate-800 text-slate-900 dark:text-white font-black" defaultValue={editItem.amount} required /></div>
                    <div className="flex flex-col gap-0.5"><label className="text-[9px] font-black uppercase text-slate-500">Type</label><select name="type" className="px-2 py-1 border-2 border-slate-300 dark:border-slate-700 rounded bg-white dark:bg-slate-800 text-slate-900 dark:text-white font-bold" defaultValue={editItem.type}>{TYPES.map(t => <option key={t} value={t}>{t}</option>)}</select></div>
                    <div className="grid grid-cols-2 gap-3">
                      <div className="flex flex-col gap-0.5"><label className="text-[9px] font-black uppercase text-slate-500">Year</label><select name="year" className="px-2 py-1 border-2 border-slate-300 dark:border-slate-700 rounded bg-white dark:bg-slate-800 text-slate-900 dark:text-white font-bold" defaultValue={editItem.year}>{years.map(y => <option key={y} value={y}>{y}</option>)}</select></div>
                      <div className="flex flex-col gap-0.5"><label className="text-[9px] font-black uppercase text-slate-500">Month</label><select name="month" className="px-2 py-1 border-2 border-slate-300 dark:border-slate-700 rounded bg-white dark:bg-slate-800 text-slate-900 dark:text-white font-bold" defaultValue={editItem.month}>{MONTHS.map(m => <option key={m} value={m}>{m}</option>)}</select></div>
                    </div>
                    <div className="flex flex-col gap-0.5"><label className="text-[9px] font-black uppercase text-slate-500">Notes</label><input name="notes" type="text" className="px-2 py-1 border-2 border-slate-300 dark:border-slate-700 rounded bg-white dark:bg-slate-800 text-slate-900 dark:text-white text-xs" defaultValue={editItem.notes || ''} placeholder="Add specific details..." /></div>
                    <div className="flex justify-end gap-2 pt-2 border-t dark:border-slate-700 mt-4"><Button variant="outline" size="sm" onClick={() => setIsEditModalOpen(false)}>Cancel</Button><Button type="submit" size="sm">Save Changes</Button></div>
                  </form>
                </Modal>
              )}
            </div>
          );
        }

        // --- Restored UI & Data Components ---

        function Button({ children, onClick, variant = 'primary', size = 'md', className = "", type = "button" }) {
          return (<button type={type} onClick={onClick} className={`${variant === 'primary' ? 'bg-blue-600 text-white shadow-sm hover:bg-blue-700' : 'border-2 border-slate-400 dark:border-slate-700 text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800'} ${size === 'sm' ? 'px-2 py-0.5 text-xs' : 'px-3 py-1.5 text-sm'} rounded font-black uppercase tracking-tighter transition-all flex items-center gap-1 active:scale-95 ${className}`}>{children}</button>);
        }

        function Tab({ active, onClick, icon, label }) {
          return (<button onClick={onClick} className={`flex items-center gap-1.5 px-3 py-2 text-[10px] font-black uppercase tracking-widest border-b-2 transition-all flex-1 justify-center whitespace-nowrap ${active ? 'border-blue-600 text-blue-600 bg-blue-50/20 dark:bg-blue-900/20 shadow-inner' : 'border-transparent text-slate-400 hover:text-slate-600 dark:hover:text-slate-300'}`}>{icon}<span>{label}</span></button>);
        }

        function Modal({ title, children, onClose }) {
          return (<div className="fixed inset-0 z-[100] flex items-center justify-center p-2 bg-slate-950/80 backdrop-blur-sm"><div className="bg-white dark:bg-slate-900 w-full max-w-sm rounded-lg shadow-2xl overflow-hidden border-2 border-slate-400 dark:border-slate-700 animate-in zoom-in-95 duration-150 text-slate-900 dark:text-slate-100"><div className="px-4 py-2 bg-slate-50 dark:bg-slate-800 border-b border-slate-400 dark:border-slate-700 flex justify-between items-center"><h3 className="text-[10px] font-black uppercase tracking-widest text-slate-600 dark:text-slate-400">{title}</h3><button onClick={onClose} className="p-1 hover:bg-slate-200 dark:hover:bg-slate-700 rounded transition-colors text-slate-500"><XCircle size={18}/></button></div><div className="p-4">{children}</div></div></div>);
        }

        function FilterDropdown({ label, value, onChange, staff, deptNames }) {
          return (
            <div className="flex flex-col gap-0.5 text-slate-900 dark:text-white"><label className="text-[8px] font-black uppercase text-slate-500 pl-1 tracking-widest uppercase">{label}</label><select value={value} onChange={e => onChange(e.target.value)} className="w-full px-1.5 py-1 bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-700 rounded font-black text-xs outline-none focus:border-blue-500 shadow-sm text-slate-900 dark:text-white"><option value="All">Show All</option><optgroup label="Departments" className="dark:bg-slate-900">{deptNames.map(d => <option key={String(d)} value={`DEPT:${String(d)}`}>{String(d)}</option>)}</optgroup><optgroup label="Individuals" className="dark:bg-slate-900">{staff.map(s => <option key={s.id} value={`STAFF:${s.name}`}>{s.name}</option>)}</optgroup></select></div>
          );
        }

        function CalendarTable({ data, totals, isLoanTable = false, deptConfigs, collapseExStaff }) {
          const processedRows = useMemo(() => {
            if (!collapseExStaff) return data;
            const activeRows = data.filter(r => r.status !== 'inactive');
            const inactiveRows = data.filter(r => r.status === 'inactive');
            if (inactiveRows.length === 0) return activeRows;
            const exStaffRow = { name: "Ex-Staff", department: "Other", status: "inactive", monthlyActivity: {}, rowTotal: 0, balanceForward: 0 };
            MONTHS.forEach(m => {
              const sum = inactiveRows.reduce((acc, row) => acc + (row[m] || 0), 0);
              exStaffRow[m] = sum;
              exStaffRow.monthlyActivity[m] = inactiveRows.some(row => row.monthlyActivity?.[m]);
            });
            if (isLoanTable) exStaffRow.balanceForward = inactiveRows.reduce((acc, row) => acc + (row.balanceForward || 0), 0);
            exStaffRow.rowTotal = inactiveRows.reduce((acc, row) => acc + (row.rowTotal || 0), 0);
            return [...activeRows, exStaffRow];
          }, [data, collapseExStaff, isLoanTable]);

          return (
            <div className="overflow-auto bg-white dark:bg-slate-900 rounded border-2 border-slate-400 dark:border-slate-700 shadow-sm scroll-smooth">
              <table className="w-full text-[13px] border-separate border-spacing-0">
                <thead className="sticky top-0 z-20">
                  <tr className="font-black uppercase text-slate-600 dark:text-slate-300 text-[10px]">
                    <th className="p-1 text-left sticky left-0 border-b-2 border-r-2 border-slate-400 dark:border-slate-700 min-w-[100px] z-30 bg-[#e8eaed] dark:bg-slate-800">Staff</th>
                    {isLoanTable && <th className="p-1 border-b-2 border-r border-slate-300 dark:border-slate-700 min-w-[50px] text-center uppercase bg-[rgba(0,0,0,0.15)]">Prev</th>}
                    {MONTHS.map(m => <th key={m} className="p-1 border-b-2 border-r border-slate-300 dark:border-slate-700 min-w-[50px] text-center uppercase bg-[rgba(0,0,0,0.15)]">{(m.split('-')[1]).toUpperCase()}</th>)}
                    <th className="p-1 text-right sticky right-0 border-b-2 border-l-2 border-slate-400 dark:border-slate-700 min-w-[85px] z-30 shadow-[-2px_0_4px_rgba(0,0,0,0.05)] bg-[#e8eaed] dark:bg-slate-800">Total</th>
                  </tr>
                </thead>
                <tbody>{processedRows.map((row, idx) => {
                  const rowBg = getDeptRowColor(row.department, deptConfigs);
                  const solidWash = getDeptSolidWash(row.department, deptConfigs);
                  return (
                    <tr key={idx} className={`${row.status==='inactive'?'italic':''} leading-none transition-colors`}>
                      <td className="p-1 font-black sticky left-0 border-b border-r-2 border-slate-400 dark:border-slate-700 whitespace-nowrap z-10 shadow-[1px_0_0_0_rgba(0,0,0,0.1)]" style={{ backgroundColor: solidWash }}><div className="flex items-center gap-1 bg-transparent"><div className={`w-1.5 h-1.5 rounded-full shrink-0 border border-white/50 shadow-sm`} style={{ backgroundColor: getDeptDotColor(row.department, deptConfigs) }}></div><span className={row.status === 'inactive' ? 'text-slate-400' : 'text-slate-900 dark:text-slate-100'}>{row.name}</span></div></td>
                      {isLoanTable && <td className="p-1 text-center border-b border-r border-slate-300 dark:border-slate-800 font-bold text-slate-500" style={{ backgroundColor: rowBg }}>{row.balanceForward !== 0 ? Math.abs(row.balanceForward).toLocaleString() : '-'}</td>}
                      {MONTHS.map(m => { const val = row[m] || 0; const hasActivity = row.monthlyActivity?.[m]; return (<td key={m} className={`p-1 text-center border-b border-r border-slate-300 dark:border-slate-800 font-black ${row.status === 'inactive' ? 'text-slate-400' : val > 0 ? (isLoanTable ? 'text-red-600' : 'text-slate-900 dark:text-slate-100') : val < 0 ? 'text-green-600' : 'text-slate-300 dark:text-slate-700'}`} style={{ backgroundColor: rowBg }}>{val !== 0 ? Math.abs(val).toLocaleString() : (hasActivity ? '0' : '-')}</td>); })}
                      <td className="p-1 text-right font-black border-b border-slate-400 dark:border-slate-700 sticky right-0 z-10 border-l-2 shadow-[-1px_0_0_0_rgba(0,0,0,0.1)]" style={{ backgroundColor: solidWash }}>{row.rowTotal.toLocaleString()}</td>
                    </tr>
                  )})}
                </tbody>
                <tfoot className="sticky bottom-0 z-20"><tr className="bg-slate-900 text-white font-black uppercase text-[10px]"><td className="p-1 sticky left-0 bg-slate-900 z-10 border-r-2 border-slate-700 uppercase shadow-[1px_0_0_0_rgba(0,0,0,0.1)]">Grand Totals</td>{isLoanTable && <td className="p-1 text-center border-r border-slate-700">{totals.balanceForward !== 0 ? Math.abs(totals.balanceForward).toLocaleString() : '-'}</td>}{MONTHS.map(m => <td key={m} className="p-1 text-center border-r border-slate-700">{totals[m]!==0?Math.abs(totals[m]).toLocaleString() : '-'}</td>)}<td className="p-1 text-right sticky right-0 bg-blue-700 z-10 shadow-[-2px_0_10px_rgba(0,0,0,0.4)] border-l-2 border-blue-800 font-black text-[11px]">฿{totals.rowTotal.toLocaleString()}</td></tr></tfoot>
              </table>
            </div>
          );
        }

        function HistoryView({ filteredLog, staffMap, deptConfigs, logSort, setLogSort, setEditItem, setIsEditModalOpen, logFilter, setLogFilter, sortedStaff, deptNames, salaries, logPeriodFilter, setLogPeriodFilter, groupHistoryByBatch, setGroupHistoryByBatch }) {
          const batches = useMemo(() => {
            if (!groupHistoryByBatch) return [{ id: 'all', items: filteredLog, total: null }];
            const groups = [];
            let currentGroup = null;
            filteredLog.forEach(log => {
              const batchId = log.batchId || (log.timestamp?.split('T')[0] + '-virtual');
              if (!currentGroup || currentGroup.id !== batchId) {
                currentGroup = { id: batchId, items: [], total: 0, date: log.timestamp, isVirtual: !log.batchId };
                groups.push(currentGroup);
              }
              currentGroup.items.push(log);
              if (['salary', 'advance'].includes(String(log.type).toLowerCase())) {
                currentGroup.total += Number(log.amount);
              }
            });
            return groups;
          }, [filteredLog, groupHistoryByBatch]);

          return (
            <div className="h-full flex flex-col p-1.5 space-y-2 text-slate-900">
              <div className="flex flex-col gap-2 shrink-0 sticky top-0 z-40 bg-slate-50 dark:bg-slate-950 pb-1 border-b dark:border-slate-800">
                <div className="grid grid-cols-2 gap-2">
                  <FilterDropdown label="Who:" value={logFilter} onChange={setLogFilter} staff={sortedStaff} deptNames={deptNames} />
                  <div className="flex flex-col gap-0.5">
                    <label className="text-[8px] font-black uppercase text-slate-500 pl-1 tracking-widest uppercase">When:</label>
                    <select value={logPeriodFilter} onChange={e => setLogPeriodFilter(e.target.value)} className="w-full px-1.5 py-1 bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-700 rounded font-black text-xs outline-none text-slate-900 dark:text-white">
                      <option value="All">All Periods</option>
                      {[...new Set(salaries.map(s => `${s.year}-${String(s.month).split('-')[1]}`))].sort().map(p => <option key={p} value={p}>{p}</option>)}
                    </select>
                  </div>
                </div>
                <div className="flex items-center gap-2 pl-1 bg-blue-600/10 p-1.5 rounded border border-blue-600/20">
                  <input type="checkbox" id="groupByBatchShort" checked={groupHistoryByBatch} onChange={e => setGroupHistoryByBatch(e.target.checked)} className="w-4 h-4 cursor-pointer" />
                  <label htmlFor="groupByBatchShort" className="text-[10px] font-black uppercase text-blue-800 dark:text-blue-300 cursor-pointer">BATCH MODE</label>
                </div>
              </div>
              <div className="flex-1 overflow-auto bg-white dark:bg-slate-900 rounded border-2 border-slate-400 dark:border-slate-700">
                <table className="w-full text-left border-collapse text-[11px]">
                  <thead className="sticky top-0 z-10 text-[9px] uppercase font-black text-slate-600 dark:text-slate-300">
                    <tr>
                      <th className="p-1 cursor-pointer bg-[#e8eaed] dark:bg-slate-800" onClick={() => setLogSort(prev => ({key:'timestamp', dir: prev.dir === 'asc' ? 'desc' : 'asc'}))}>Date <ArrowUpDown size={7} className="inline"/></th>
                      <th className="p-1 cursor-pointer bg-[#e8eaed] dark:bg-slate-800" onClick={() => setLogSort(prev => ({key:'staffName', dir: prev.dir === 'asc' ? 'desc' : 'asc'}))}>Staff <ArrowUpDown size={7} className="inline"/></th>
                      <th className="p-1 cursor-pointer bg-[#e8eaed] dark:bg-slate-800" onClick={() => setLogSort(prev => ({key:'period', dir: prev.dir === 'asc' ? 'desc' : 'asc'}))}>Period <ArrowUpDown size={7} className="inline"/></th>
                      <th className="p-1 cursor-pointer bg-[#e8eaed] dark:bg-slate-800" onClick={() => setLogSort(prev => ({key:'type', dir: prev.dir === 'asc' ? 'desc' : 'asc'}))}>Type <ArrowUpDown size={7} className="inline"/></th>
                      <th className="p-1 text-right cursor-pointer bg-[#e8eaed] dark:bg-slate-800" onClick={() => setLogSort(prev => ({key:'amount', dir: prev.dir === 'asc' ? 'desc' : 'asc'}))}>Amount <ArrowUpDown size={7} className="inline"/></th>
                      <th className="p-1 bg-[#e8eaed] dark:bg-slate-800">Notes</th>
                      <th className="p-1 bg-[#e8eaed] dark:bg-slate-800"></th>
                    </tr>
                  </thead>
                  <tbody className="dark:text-slate-200">
                    {batches.map(batch => (
                      <Fragment key={batch.id}>
                        {groupHistoryByBatch && (
                          <tr className="bg-blue-600/20 dark:bg-blue-900/40 border-y border-blue-400 dark:border-blue-800">
                            <td colSpan={7} className="p-1.5 px-3">
                              <div className="flex items-center justify-between">
                                <div className="flex items-center gap-2 text-blue-700 dark:text-blue-300 font-black text-[10px] uppercase tracking-wider"><Layers size={12}/> {batch.isVirtual ? `Virtual Batch: ${formatDisplayDate(batch.date)}` : `System Batch: Transaction`}</div>
                                <div className="font-black text-blue-600 dark:text-blue-400">Transfer Total: ฿{batch.total?.toLocaleString() || '-'}</div>
                              </div>
                            </td>
                          </tr>
                        )}
                        {batch.items.map(s => {
                          const member = staffMap[(s.staffName || "").trim()];
                          const rowBg = getDeptRowColor(member?.department, deptConfigs);
                          return (
                            <tr key={s.id} className={`border-b border-slate-200 dark:border-slate-800 transition-colors ${member?.status === 'inactive' ? 'opacity-60 italic' : ''}`}>
                              <td className="p-1 whitespace-nowrap" style={{ backgroundColor: rowBg }}>{formatDisplayDate(s.timestamp)}</td>
                              <td className="p-1 font-black truncate max-w-[80px]" style={{ backgroundColor: rowBg }}>{String(s.staffName)}</td>
                              <td className="p-1 font-bold" style={{ backgroundColor: rowBg }}>{s.period}</td>
                              <td className="p-1" style={{ backgroundColor: rowBg }}><span className={`px-1.5 py-0.5 rounded text-[8px] font-black uppercase ${String(s.type).toLowerCase()==='advance'?'text-red-600 bg-white/70':String(s.type).toLowerCase()==='repayment'?'text-green-600 bg-white/70':'text-slate-500'}`}>{String(s.type)}</span></td>
                              <td className={`p-1 text-right font-black ${String(s.type).toLowerCase()==='advance'?'text-red-600':String(s.type).toLowerCase()==='repayment'?'text-green-600':''}`} style={{ backgroundColor: rowBg }}>฿{Number(s.amount).toLocaleString()}</td>
                              <td className="p-1 italic text-slate-500 dark:text-slate-400 text-[10px] truncate max-w-[100px]" style={{ backgroundColor: rowBg }}>{s.notes || '-'}</td>
                              <td className="p-1 text-right" style={{ backgroundColor: rowBg }}><div className="flex gap-1 justify-end"><button onClick={() => { setEditItem(s); setIsEditModalOpen(true); }} className="text-slate-400 hover:text-blue-500 p-0.5"><Edit2 size={12}/></button><button onClick={() => deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'salaries', s.id))} className="text-slate-300 hover:text-red-500 p-0.5"><Trash2 size={12}/></button></div></td>
                            </tr>
                          );
                        })}
                      </Fragment>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          );
        }

        function DebtLedger({ salaries, staff, filter, sort, deptConfigs, deptNames }) {
          const ledgerData = useMemo(() => staff.map(m => {
              const recs = salaries.filter(s => (s.staffName || "").trim().toLowerCase() === (m.name || "").trim().toLowerCase());
              const advances = recs.filter(s => String(s.type).toLowerCase() === 'advance').reduce((s, c) => s + Number(c.amount), 0);
              const repayments = recs.filter(s => String(s.type).toLowerCase() === 'repayment').reduce((s, c) => s + Number(c.amount), 0);
              return { ...m, advances, repayments, balance: advances - repayments };
            }).filter(m => { 
                if (filter === "All") return m.balance !== 0 || m.status === 'active'; 
                if (filter.startsWith("DEPT:")) return m.department === filter.replace("DEPT:", ""); 
                if (filter.startsWith("STAFF:")) return m.name === filter.replace("STAFF:", ""); 
                return true; 
            }).sort((a, b) => { 
                if (sort.key === 'balance') return b.balance - a.balance; 
                if (sort.key === 'advances') return b.advances - a.advances; 
                if (sort.key === 'name') {
                    const scoreA = getSortScore(a, deptNames);
                    const scoreB = getSortScore(b, deptNames);
                    return scoreA - scoreB;
                }
                return (a.name || "").localeCompare(b.name || ""); 
            }), [salaries, staff, filter, sort, deptNames]);
          const [expandedId, setExpandedId] = useState(null);
          return (
            <table className="w-full text-left border-separate border-spacing-0">
              <thead className="font-black uppercase border-b-2 border-slate-400 dark:border-slate-700 sticky top-0 z-20 text-[10px] text-slate-600 dark:text-slate-300">
                <tr><th className="p-2 border-r dark:border-slate-700 bg-[rgba(0,0,0,0.15)]">Staff Member</th><th className="p-2 border-r dark:border-slate-700 text-right text-red-500 bg-[rgba(0,0,0,0.15)]">All-Time Advances</th><th className="p-2 border-r dark:border-slate-700 text-right text-green-600 bg-[rgba(0,0,0,0.15)]">All-Time Repaid</th><th className="p-2 text-right bg-[rgba(0,0,0,0.15)]">Owed Balance</th></tr>
              </thead>
              <tbody>{ledgerData.map(m => {
                  const rowBg = getDeptRowColor(m.department, deptConfigs);
                  return (
                    <Fragment key={m.id}>
                      <tr onClick={() => setExpandedId(expandedId === m.id ? null : m.id)} className={`border-b border-slate-100 dark:border-slate-800 cursor-pointer hover:brightness-95 transition-all leading-none ${m.status === 'inactive' ? 'italic text-slate-400 opacity-60' : 'text-slate-900 dark:text-slate-100'}`}>
                        <td className="p-2 font-black border-r dark:border-slate-700 flex items-center gap-2" style={{ backgroundColor: rowBg }}><div className="w-2 h-2 rounded-full border border-white/50 shadow-sm" style={{ backgroundColor: getDeptDotColor(m.department, deptConfigs) }}></div>{m.name}{expandedId === m.id ? <ChevronUp size={12}/> : <ChevronDown size={12}/>}</td>
                        <td className="p-2 border-r dark:border-slate-700 text-right font-bold text-red-500/70" style={{ backgroundColor: rowBg }}>฿{m.advances.toLocaleString()}</td>
                        <td className="p-2 border-r dark:border-slate-700 text-right font-bold text-green-600/70" style={{ backgroundColor: rowBg }}>฿{m.repayments.toLocaleString()}</td>
                        <td className={`p-2 text-right font-black border-l-2 border-slate-400 dark:border-slate-700 ${m.balance > 0 ? 'text-red-700' : 'text-slate-300 dark:text-slate-600'}`} style={{ backgroundColor: rowBg }}>฿{m.balance.toLocaleString()}</td>
                      </tr>
                      {expandedId === m.id && (<tr><td colSpan={4} className="bg-slate-100 dark:bg-slate-800 p-0 shadow-inner border-b-2 border-slate-300 dark:border-slate-700"><div className="p-1 px-4 bg-slate-900 text-[8px] text-slate-400 font-black uppercase tracking-widest">Historical Debt Ledger Flow</div><table className="w-full text-[10px] border-collapse bg-white dark:bg-slate-900"><thead className="bg-slate-50 dark:bg-slate-800 text-[9px] font-black border-b border-slate-300 dark:border-slate-700 text-slate-500 dark:text-slate-400 uppercase"><tr><th className="p-1 text-left px-4">Date</th><th className="p-1 text-right">Type</th><th className="p-1 text-right">Amount</th><th className="p-1 text-right px-4">Running Total</th></tr></thead><tbody>{(() => { let runningBal = 0; const staffRecs = salaries.filter(s => (s.staffName || "").trim().toLowerCase() === (m.name || "").trim().toLowerCase()).filter(s => ['advance', 'repayment'].includes(String(s.type).toLowerCase())).sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp)); if (staffRecs.length === 0) return <tr><td colSpan={4} className="p-4 text-center text-slate-300 dark:text-slate-600 italic">No historical debt entries.</td></tr>; return staffRecs.map((s, idx) => { const amt = Number(s.amount); const t = String(s.type).toLowerCase(); runningBal += (t === 'advance' ? amt : -amt); return (<tr key={idx} className="border-b border-slate-50 dark:border-slate-800/50"><td className="p-1 px-4 font-bold text-slate-500 dark:text-slate-400">{formatDisplayDate(s.timestamp)}</td><td className={`p-1 text-right text-[8px] font-black uppercase ${t === 'advance' ? 'text-red-500' : 'text-green-600'}`}>{String(s.type)}</td><td className="p-1 text-right font-black dark:text-slate-200">฿{amt.toLocaleString()}</td><td className={`p-1 text-right px-4 font-black bg-slate-50 dark:bg-slate-800/20 ${runningBal > 0 ? 'text-red-600' : 'text-slate-400 dark:text-slate-500'}`}>฿{runningBal.toLocaleString()}</td></tr>); }); })()}</tbody></table></td></tr>)}</Fragment>
                  )})}
              </tbody>
            </table>
          );
        }

        function DeptManagerModal({ configs, onClose, onSave }) {
          const [localConfigs, setLocalConfigs] = useState([...configs]);
          const [newName, setNewName] = useState('');
          const [selectedColor, setSelectedColor] = useState('#3b82f6');
          const [activePickerIdx, setActivePickerIdx] = useState(null);
          const handleAdd = () => { if (!newName.trim()) return; const next = [...localConfigs, { name: newName.trim(), color: selectedColor }]; setLocalConfigs(next); onSave(next); setNewName(''); };
          const handleUpdateName = (idx, val) => { const next = [...localConfigs]; next[idx].name = val; setLocalConfigs(next); onSave(next); };
          const handleUpdateColor = (idx, hex) => { const next = [...localConfigs]; next[idx].color = hex; setLocalConfigs(next); onSave(next); setActivePickerIdx(null); };
          const handleRemove = (idx) => { const next = localConfigs.filter((_, i) => i !== idx); setLocalConfigs(next); onSave(next); };
          return (
            <Modal title="Manage Departments" onClose={onClose}><div className="space-y-4"><div className="bg-slate-50 dark:bg-slate-800 p-3 rounded border-2 border-slate-200 dark:border-slate-700 space-y-3"><div className="flex flex-col gap-2"><input type="text" className="w-full border-2 border-slate-300 dark:border-slate-700 dark:bg-slate-900 rounded px-2 py-1 font-bold text-sm outline-none" placeholder="Add New Dept..." value={newName} onChange={e => setNewName(e.target.value)} /><div className="flex flex-wrap gap-1">{COLOR_OPTIONS.map(opt => (<button key={opt.hex} type="button" onClick={() => setSelectedColor(opt.hex)} className={`w-5 h-5 rounded border shadow-sm transition-all ${selectedColor === opt.hex ? 'ring-2 ring-blue-500 ring-offset-1 scale-110' : 'hover:scale-105'}`} style={{ backgroundColor: opt.hex }} />))}</div><Button onClick={handleAdd} className="w-full">Create Department</Button></div></div><div className="space-y-2 max-h-64 overflow-auto border dark:border-slate-700 rounded p-1 bg-slate-50/50">{localConfigs.map((c, idx) => (<div key={idx} className="space-y-1"><div className="flex justify-between items-center bg-white dark:bg-slate-800 p-1.5 rounded border border-slate-200 dark:border-slate-700 gap-2"><button onClick={() => setActivePickerIdx(activePickerIdx === idx ? null : idx)} className="w-5 h-5 rounded-full shrink-0 border shadow-sm transition-transform hover:scale-110" style={{ backgroundColor: c.color }} /><input type="text" className="flex-1 bg-transparent font-black text-[11px] uppercase outline-none focus:border-b border-blue-500" value={c.name} onBlur={e => handleUpdateName(idx, e.target.value)} onChange={e => { const n = [...localConfigs]; n[idx].name = e.target.value; setLocalConfigs(n); }} /><button onClick={() => handleRemove(idx)} className="text-red-400 hover:text-red-600 p-1"><Trash2 size={14}/></button></div>{activePickerIdx === idx && (<div className="bg-white dark:bg-slate-900 p-2 rounded border-2 border-blue-500 grid grid-cols-6 gap-1 animate-in slide-in-from-top-1 z-10 shadow-lg">{COLOR_OPTIONS.map(opt => (<button key={opt.hex} type="button" onClick={() => handleUpdateColor(idx, opt.hex)} className="w-full aspect-square rounded border shadow-sm hover:scale-110 transition-transform" style={{ backgroundColor: opt.hex }} />))}</div>)}</div>))}</div></div></Modal>
          );
        }

        function BulkPaymentModal({ staff, deptConfigs, salaries, onClose, onSave }) {
          const [yr, setYr] = useState(new Date().getFullYear());
          const [mo, setMo] = useState(MONTHS[new Date().getMonth()]);
          const [dt, setDt] = useState(new Date().toISOString().split('T')[0]);
          const debtMap = useMemo(() => { const map = {}; salaries.forEach(s => { const name = (s.staffName || "").trim().toLowerCase(); if (!name) return; if (!map[name]) map[name] = 0; const amt = Number(s.amount); const type = String(s.type).toLowerCase(); if (type === 'advance') map[name] += amt; if (type === 'repayment') map[name] -= amt; }); return map; }, [salaries]);
          const [rows, setRows] = useState(staff.map(s => ({ id: s.id, name: s.name, salary: s.baseSalary||0, advance: 0, repayment: 0, notes: "", included: true, department: s.department })));
          const update = (id, f, v) => { setRows(prevRows => prevRows.map(r => { if (r.id !== id) return r; let nextRow = { ...r, [f]: v }; if (f === 'repayment') { const member = staff.find(s => s.id === id); const base = member?.baseSalary || 0; nextRow.salary = Math.max(0, base - v); } return nextRow; })); };
          const totalPayout = useMemo(() => { return rows.reduce((sum, r) => { if (!r.included) return sum; return sum + (Number(r.salary) + Number(r.advance)); }, 0); }, [rows]);
          return (
            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/30">
                <div className="bg-white dark:bg-slate-900 w-full max-w-4xl max-h-[90vh] h-auto rounded-xl shadow-2xl overflow-hidden border-2 border-slate-400 dark:border-slate-700 flex flex-col animate-in zoom-in-95 duration-150">
                    <div className="px-4 py-2 bg-slate-50 dark:bg-slate-800 border-b-2 border-slate-400 dark:border-slate-700 flex justify-between items-center shrink-0">
                        <div className="flex items-center gap-4"><h3 className="text-[16px] font-black uppercase tracking-widest text-blue-700 dark:text-blue-400">Payroll Entry</h3><div className="flex gap-2"><input type="date" value={dt} onChange={e => setDt(e.target.value)} className="text-[13px] font-black px-2 py-0.5 border-2 border-slate-400 dark:border-slate-700 dark:bg-slate-900 rounded outline-none" /><select value={yr} onChange={e => setYr(parseInt(e.target.value))} className="text-[13px] font-black px-2 py-0.5 border-2 border-slate-300 dark:border-slate-700 dark:bg-slate-900 rounded bg-white dark:bg-slate-800 outline-none">{[2024, 2025, 2026, 2027, 2028].map(y => <option key={y} value={y}>{y}</option>)}</select><select value={mo} onChange={e => setMo(e.target.value)} className="text-[13px] font-black px-2 py-0.5 border-2 border-slate-300 dark:border-slate-700 dark:bg-slate-900 rounded bg-white dark:bg-slate-800 outline-none">{MONTHS.map(m => <option key={m} value={m}>{m}</option>)}</select></div></div>
                        <button onClick={onClose} className="p-1 hover:bg-slate-200 rounded text-slate-500 transition-colors"><XCircle size={24}/></button>
                    </div>
                    <div className="flex-1 overflow-auto">
                        <table className="w-full text-left border-collapse table-auto">
                            <thead className="bg-white dark:bg-slate-900 z-10 border-b-2 border-slate-500 font-black text-slate-500 uppercase text-[12px] sticky top-0">
                                <tr><th className="p-2 w-10 text-center bg-slate-50 dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700"><input type="checkbox" checked={rows.every(r=>r.included)} onChange={e => setRows(rows.map(r=>({...r,included:e.target.checked})))} className="w-5 h-4 ml-1"/></th><th className="p-2 min-w-[140px] max-w-[140px] text-[13px] font-black uppercase tracking-tighter bg-slate-50 dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 text-left">Employee</th><th className="p-2 w-24 text-right font-black uppercase tracking-tighter bg-slate-50/50 dark:bg-slate-800/50 text-red-500 border-b border-slate-200 dark:border-slate-700 border-r dark:border-slate-700/50">Owed</th><th className="p-2 w-16 text-center font-black uppercase tracking-tighter bg-slate-100 dark:bg-slate-800/80 text-slate-400 border-b border-slate-200 dark:border-slate-700" title="Salary already paid this month">PAID</th><th className="p-2 w-16 text-center font-black uppercase tracking-tighter bg-slate-100 dark:bg-slate-800/80 text-slate-400 border-b border-slate-200 dark:border-slate-700 border-r dark:border-slate-700/50" title="Repayments already made this month">REPAID</th><th className="p-2 w-20 text-center font-black uppercase tracking-tighter bg-slate-50 dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700">+ Sal</th><th className="p-2 w-20 text-center font-black uppercase tracking-tighter bg-slate-50 dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700">+ Adv</th><th className="p-2 w-20 text-center font-black uppercase tracking-tighter bg-slate-50 dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700">+ Rep</th><th className="p-2 text-[12px] font-black uppercase tracking-tighter bg-slate-50 dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 w-full text-left">Notes</th></tr>
                            </thead>
                            <tbody>
                                {rows.map(r => {
                                    const rowBg = r.included ? getDeptRowColor(r.department, deptConfigs) : 'transparent';
                                    const currentOwed = debtMap[(r.name || "").toLowerCase().trim()] || 0;
                                    const alreadyPaid = salaries.some(s => (s.staffName || "").trim().toLowerCase() === (r.name || "").toLowerCase().trim() && Number(s.year) === Number(yr) && isSameMonth(s.month, mo) && String(s.type).toLowerCase() === 'salary');
                                    const thisMonthRecs = salaries.filter(s => (s.staffName || "").trim().toLowerCase() === (r.name || "").toLowerCase().trim() && Number(s.year) === Number(yr) && isSameMonth(s.month, mo));
                                    const prevSal = thisMonthRecs.filter(s => String(s.type).toLowerCase() === 'salary').reduce((a,c) => a + Number(c.amount), 0);
                                    const prevRep = thisMonthRecs.filter(s => String(s.type).toLowerCase() === 'repayment').reduce((a,c) => a + Number(c.amount), 0);
                                    return (
                                        <tr key={r.id} className={`${r.included?'':'opacity-30'} border-b border-slate-100 dark:border-slate-800 transition-colors leading-none`}><td className="p-1 text-center align-middle" style={{ backgroundColor: rowBg }}><input type="checkbox" checked={r.included} onChange={e => update(r.id,'included',e.target.checked)} className="w-5 h-4 ml-1 cursor-pointer"/></td><td className="p-1 min-w-[140px] max-w-[140px] font-black text-[15px] text-slate-900 dark:text-slate-100 align-middle" style={{ backgroundColor: rowBg }}><div className="flex items-center gap-1.5 overflow-visible">{alreadyPaid && (<div className="group relative shrink-0"><AlertTriangle size={15} className="text-red-600 animate-pulse cursor-help" /><div className="absolute left-0 bottom-full mb-1 hidden group-hover:block bg-red-600 text-white text-[11px] px-2 py-1 rounded shadow-lg whitespace-nowrap z-50 font-black uppercase font-sans">Paid {mo}</div></div>)}<span className="truncate">{String(r.name)}</span></div></td><td className="p-1 text-right font-black text-[13px] text-red-500/80 align-middle whitespace-nowrap pr-3 border-r dark:border-slate-700/30" style={{ backgroundColor: rowBg }}>฿{currentOwed.toLocaleString()}</td><td className="p-1 text-center font-bold text-[11px] text-slate-400 align-middle opacity-70" style={{ backgroundColor: rowBg }}>{prevSal > 0 ? prevSal.toLocaleString() : '-'}</td><td className="p-1 text-center font-bold text-[11px] text-green-500 align-middle opacity-70 border-r dark:border-slate-700/30" style={{ backgroundColor: rowBg }}>{prevRep > 0 ? prevRep.toLocaleString() : '-'}</td><td className="p-1 text-center align-middle" style={{ backgroundColor: rowBg }}><input type="number" className="w-16 border border-slate-300 dark:border-slate-700 dark:bg-slate-900 rounded font-black text-[15px] text-center outline-none focus:border-blue-500" value={r.salary} onChange={e => update(r.id,'salary',parseFloat(e.target.value)||0)} /></td><td className="p-1 text-center align-middle" style={{ backgroundColor: rowBg }}><input type="number" className="w-16 border border-slate-300 dark:border-slate-700 dark:bg-slate-900 rounded font-black text-[15px] text-center text-red-600 outline-none focus:border-blue-500" value={r.advance} onChange={e => update(r.id,'advance',parseFloat(e.target.value)||0)} /></td><td className="p-1 text-center align-middle" style={{ backgroundColor: rowBg }}><input type="number" className="w-16 border border-slate-300 dark:border-slate-700 dark:bg-slate-900 rounded font-black text-[15px] text-center text-green-600 outline-none focus:border-blue-500" value={r.repayment} onChange={e => update(r.id,'repayment',parseFloat(e.target.value)||0)} /></td><td className="p-1 align-middle w-full" style={{ backgroundColor: rowBg }}><input type="text" className="w-full border border-slate-200 dark:border-slate-800 dark:bg-slate-800 px-2 py-1.5 rounded text-[14px] font-medium outline-none" placeholder="..." value={r.notes} onChange={e => update(r.id,'notes',e.target.value)} /></td></tr>
                                    )})}
                            </tbody>
                        </table>
                    </div>
                    <div className="p-3 bg-slate-50 dark:bg-slate-800 border-t-2 border-slate-400 dark:border-slate-700 flex justify-between items-center shrink-0 shadow-inner">
                        <div className="flex flex-col"><span className="text-[10px] font-black uppercase text-slate-400 tracking-tighter">Total Net Payout</span><span className="text-[17px] font-black text-blue-600">฿{totalPayout.toLocaleString()}</span></div>
                        <div className="flex gap-3"><Button variant="outline" onClick={onClose} className="px-6 py-2 uppercase font-black tracking-tight text-[13px]">Cancel</Button><Button onClick={() => onSave(rows, yr, mo, dt, totalPayout)} className="px-8 py-2 text-[13px] font-black uppercase tracking-widest bg-blue-700">Submit Payroll</Button></div>
                    </div>
                </div>
            </div>
          ); 
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script src="https://loren-6q.github.io/WETNav/nav.js"></script>
</body>
</html>
